  </symbol>

  <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!--
      App logo mark — crescent moon.
      Universally understood as "night" and "lunar cycle."
      Moon = menstrual cycle association is cross-cultural (Buckley & Gottlieb 1988).
      Note: In Islamic iconography the crescent moon has religious significance.
      LUNA uses it in a purely astronomical sense — health science context.
    -->
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </symbol>

  <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
