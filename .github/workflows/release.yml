name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        default: 'both'
        type: choice
        options:
          - ios
          - android
          - both

jobs:
  test:
    name: Rust Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
        working-directory: .

  build-ios:
    name: iOS Build & Upload
    runs-on: macos-14
    needs: test
    if: github.event.inputs.platform != 'android'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Build Rust core
        run: |
          IPHONEOS_DEPLOYMENT_TARGET=16.0 cargo build --target aarch64-apple-ios --release -p luna-core
          cp target/aarch64-apple-ios/release/libluna_core.a ios-app/LunaApp/Generated/libluna_core.a

      - name: Install provisioning profile
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/luna-appstore.mobileprovision

      - name: Install certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Archive
        run: |
          IPHONEOS_DEPLOYMENT_TARGET=16.0 xcodebuild archive \
            -project ios-app/LunaApp.xcodeproj \
            -scheme LunaApp \
            -archivePath /tmp/LunaApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=P36X572LL9 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="LUNA App Store Distribution"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath /tmp/LunaApp.xcarchive \
            -exportPath /tmp/LunaApp_export \
            -exportOptionsPlist fastlane/ExportOptions.plist

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: /tmp/asc_key.p8
        run: |
          echo "${{ secrets.ASC_PRIVATE_KEY }}" > /tmp/asc_key.p8
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/LunaApp_export/LUNA.ipa \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}

  build-android:
    name: Android Build & Upload
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.platform != 'ios'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        run: |
          cargo install cargo-ndk --locked 2>/dev/null || true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android-app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > android-app/keystore/luna-release.jks

      - name: Create key.properties
        run: |
          cat > android-app/key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=luna
          storeFile=keystore/luna-release.jks
          EOF

      - name: Build AAB
        run: |
          cd android-app
          ./gradlew bundleRelease

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.luna
          releaseFiles: android-app/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
