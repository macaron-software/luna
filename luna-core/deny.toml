[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "OpenSSL",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Interdire les crates d'analytics / telemetry
    { name = "sentry" },
    { name = "mixpanel" },
    { name = "amplitude" },
    # Interdire les crates réseau non nécessaires pour le core
    { name = "reqwest" },
    { name = "hyper" },
    { name = "tokio", reason = "Le core ne doit pas faire d'I/O réseau" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
